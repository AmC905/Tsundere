<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Private</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<style>

html,body{
margin:0;
padding:0;
height:100%;
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
background:#0a0a0a;
color:#fff;
overflow-x:hidden;
}

/* ===== 深層動態暗黑背景 ===== */

body{
background:
radial-gradient(circle at 20% 30%,rgba(255,255,255,0.05),transparent 40%),
radial-gradient(circle at 80% 70%,rgba(255,255,255,0.03),transparent 50%),
#0a0a0a;
transition:3s ease;
}

body.zoomed{
animation:cinematicZoom 8s ease forwards;
}

@keyframes cinematicZoom{
0%{transform:scale(1);}
100%{transform:scale(1.08);}
}

/* ===== Spotlight ===== */

body::after{
content:'';
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle at center,rgba(255,255,255,0.08),transparent 70%);
opacity:0;
transition:2s ease;
pointer-events:none;
}

body.unlocked::after{
opacity:1;
}

/* ===== 高級玻璃卡片 ===== */

#input-area{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:70px 60px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(30px);
border-radius:32px;
border:1px solid rgba(255,255,255,0.15);
box-shadow:
0 40px 80px rgba(0,0,0,0.8),
0 0 60px rgba(255,255,255,0.05);
text-align:center;
z-index:2;
transition:1.4s cubic-bezier(.19,1,.22,1);
}

#input-area h1{
font-weight:300;
letter-spacing:6px;
font-size:18px;
opacity:.7;
margin-bottom:40px;
}

/* ===== 高級輸入框 ===== */

input{
background:transparent;
border:none;
border-bottom:1px solid rgba(255,255,255,0.3);
color:#fff;
padding:12px;
width:240px;
font-size:18px;
text-align:center;
outline:none;
transition:.5s;
}

input:focus{
border-bottom:1px solid #fff;
}

/* ===== 高級按鈕 ===== */

button{
margin-top:40px;
padding:14px 34px;
background:transparent;
border:1px solid rgba(255,255,255,0.4);
color:#fff;
letter-spacing:2px;
border-radius:40px;
cursor:pointer;
transition:.4s;
}

button:hover{
background:rgba(255,255,255,0.1);
border:1px solid #fff;
}

/* ===== 信件文字區 ===== */

#letter{
max-width:700px;
margin:0 auto;
padding:160px 30px 300px 30px;
position:relative;
z-index:1;
}

#letter p{
opacity:0;
transform:translateY(40px);
filter:blur(8px);
transition:1.6s cubic-bezier(.19,1,.22,1);
font-size:22px;
line-height:1.9;
margin:60px 0;
font-weight:300;
letter-spacing:1px;
}

#letter p.show{
opacity:1;
transform:translateY(0);
filter:blur(0);
}

</style>
</head>

<body>

<div id="input-area">
<h1>CONFIDENTIAL</h1>
<input type="password" id="pw" placeholder="Enter Password" onkeydown="if(event.key==='Enter'){unlockPage()}">
<br>
<button onclick="unlockPage()">ENTER</button>
</div>

<div id="letter"></div>

<script>

/* 把這串改成你自己的加密字串 */
const encryptedLetter = "U2FsdGVkX1+3OanEWpKxFqCxttcxraKYoJOFVBTJBxkxhuwbeRGk7R4PZQluZzT7Sf2Jzn2kBrPr5gMMGl5Ab/st7yaQXzHyYGhGjTlPkYlQnNFDlI0Bla37x8k1OOrcOfSpffJ2V8PkoRj3R2IWzaP4efmaoJVvQ4gWj6lAs0iHNDvOG50N+pSPrisGYj/OoL1DtDQDtVuyMl7LKs3oLXRlFs7pi+ZPwBr5QDuwVt1poBEbmxokh2KfUhFPEkUNZQauaZbuM++QApiltz33Mar1zP68fEQWwWYnFm0GYc0yn7jnfU2aPf89pS9Lb3YZk4T2lff8CDNkChgkNiXZej1MT+i4eWyZPe0pf826S0GA3HnPT1qbgDJiijIySxbCfWaDR7DY2RyNp+nJhjbetJQ5mYPxhi/DNdjJVBz3Q9ZRNXIQjEnqJTrk/KMokY8QlgYHNopsLM4NqCgE/wxUmEV1WE8NHZN28VqRbaQdIujI+Jso/gtKWxzQ8pB6Uu9YXY0H2X/L2fllnTYd5w4nd1jkL7w0ajD9IYVwIkPWixIhEWfl0/KQNxMjzT2gKq7L+Htmtozai6wOOG2emw4ag+697Eg2flzACj32+QugPLKUoZ4gDbd5rSG55Jyr9FpCOc/Y5t5aDnP3QmRJ852gxGfUbW7VlJRMEfgzKo7AKgAUqOMW/Ny/Z/XN5I9iS2nHntCRLX98O1X+fJEfadEH9cO9qrJXIiHprEDpH1yeCsH1v5Wr9pi0YvwkjbPBjgcLnj27Xo+IJd+ZNDCH5HZxkjmBnYjMS1DLI4xjLipNp4DIso3YcwYIFVHo4c/m9hEIiGOsSiXZ5V+t5iNvv1NadOXdeTmJLU3IUGlGYsPTKe2xIbVmFsgXszx5JjhJcByGL5aBaTM+NWd1n/BFXOAedg==";

function unlockPage(){

const input = document.getElementById("pw").value.trim();

try{

const bytes = CryptoJS.AES.decrypt(encryptedLetter,input);
const decrypted = bytes.toString(CryptoJS.enc.Utf8);

if(!decrypted) throw "error";

const loveLetter = JSON.parse(decrypted);

const card = document.getElementById("input-area");

card.style.opacity="0";
card.style.transform="translate(-50%,-50%) scale(.85) rotateX(10deg)";

document.body.classList.add("unlocked");
document.body.classList.add("zoomed");

setTimeout(()=>{
card.style.display="none";
},1400);

const letterEl=document.getElementById("letter");
letterEl.innerHTML="";

let i=0;

function showLine(){

if(i<loveLetter.length){

const line=document.createElement("p");
line.innerHTML=loveLetter[i];
letterEl.appendChild(line);

setTimeout(()=>{
line.classList.add("show");
line.scrollIntoView({
behavior:"smooth",
block:"end"
});
},150);

i++;
setTimeout(showLine,1600);

}
}

setTimeout(showLine,1000);

}catch(e){
alert("Access Denied");
}

}

document.getElementById("pw").addEventListener("keydown", function(e){
if(e.key === "Enter"){
unlockPage();
}
});

</script>

</body>
</html>
