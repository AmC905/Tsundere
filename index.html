<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=0.5">
<meta charset="UTF-8">
  
<title>TSUNDERE</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<style>

html,body{
margin:0;
padding:0;
height:100%;
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
color:#fff;
overflow-x:hidden;
}

/* ===== 咖啡電影感背景 ===== */

body{
background:
linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
radial-gradient(circle at 20% 30%,rgba(255,255,255,0.05),transparent 40%),
radial-gradient(circle at 80% 70%,rgba(255,255,255,0.03),transparent 50%),
url('https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
background-position:center;
background-attachment:fixed;
transition:3s ease;
}

body.zoomed{
animation:cinematicZoom 8s ease forwards;
}

@keyframes cinematicZoom{
0%{transform:scale(1);}
100%{transform:scale(1.08);}
}

/* ===== Spotlight ===== */

body::after{
content:'';
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle at center,rgba(255,255,255,0.08),transparent 70%);
opacity:0;
transition:2s ease;
pointer-events:none;
}

body.unlocked::after{
opacity:1;
}

/* ===== 微霧玻璃卡片 ===== */

#input-area{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
padding:80px 70px;

background:rgba(255,248,235,0.08);
backdrop-filter:blur(35px);

border-radius:40px;
border:1px solid rgba(255,255,255,0.25);

box-shadow:
0 80px 120px rgba(0,0,0,0.9),
0 0 120px rgba(255,255,255,0.04);

text-align:center;
z-index:2;
transition:1.4s cubic-bezier(.19,1,.22,1);
}

#input-area h1{
font-weight:600;
letter-spacing:8px;
font-size:28px;
opacity:.7;
margin-bottom:60px;
}

/* ===== 輸入框 ===== */

input{
background:transparent;
border:none;
border-bottom:1px solid rgba(255,255,255,0.4);
color:#fff;
padding:14px;
width:260px;
font-size:22px;
text-align:center;
outline:none;
transition:.5s;
}

input:focus{
border-bottom:1px solid #fff;
}

/* ===== 按鈕 ===== */

button{
margin-top:48px;
padding:18px 36px;
background:transparent;
border:1px solid rgba(255,255,255,0.5);
color:#fff;
letter-spacing:2px;
border-radius:44px;
cursor:pointer;
transition:.4s;
}

button:hover{
background:rgba(255,255,255,0.12);
border:1px solid #fff;
}

/* ===== 信件文字區 ===== */

#letter{
max-width:680px;
margin:0 auto;
padding:120px 24px 220px 24px;
position:relative;
z-index:1;
text-align:center;
}

#letter p{
opacity:0;
transform:translateY(20px);
filter:blur(8px);
transition:1.6s cubic-bezier(.19,1,.22,1);

font-size:clamp(20px, 5vw, 34px);
line-height:1.9;
margin:32px 0;
font-weight:400;
letter-spacing:1px;
}

#letter p.show{
opacity:1;
transform:translateY(0);
filter:blur(0);
}

/* ===== 超連結樣式 ===== */

#letter a {
  color: #fff;
  text-decoration: none;
}

#letter a:hover {
  text-decoration: underline;
}

</style>
</head>

<body>

<div id="input-area">
<h1>JANE DOE</h1>
<input type="password" id="pw" placeholder="Enter Password" onkeydown="if(event.key==='Enter'){unlockPage()}">
<br>
<button onclick="unlockPage()">ENTER</button>
</div>

<div id="letter"></div>

<script>

function unlockPage(){

if(isUnlocked) return;
isUnlocked = true;

const input = document.getElementById("pw").value.trim();

try{

const bytes = CryptoJS.AES.decrypt(encryptedLetter,input);
const decrypted = bytes.toString(CryptoJS.enc.Utf8);

if(!decrypted) throw "error";

const loveLetter = JSON.parse(decrypted);

const card = document.getElementById("input-area");

card.style.opacity="0";
card.style.transform="translate(-50%,-50%) scale(.85) rotateX(10deg)";

},1400);

function showLine(){

if(i<loveLetter.length){

const line=document.createElement("p");
line.innerHTML=loveLetter[i];
letterEl.appendChild(line);

setTimeout(()=>{
line.classList.add("show");
line.scrollIntoView({
behavior:"smooth",
block:"end"
});
},150);

i++;
setTimeout(showLine,1600);

}
}

setTimeout(showLine,1000);

}catch(e){
alert("Access Denied");
isUnlocked = false;
}

}

document.getElementById("pw").addEventListener("keydown", function(e){
if(e.key === "Enter"){
unlockPage();
}
});

</script>

</body>
</html>
